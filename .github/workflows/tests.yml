name: Tests

on:
  push:
    branches:
      - master
      - production
  pull_request:
    branches:
      - master
      - production

permissions:
  contents: write

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    # A suíte de integração exige um backend compartilhado de verdade. Sem
    # este serviço ela se pula sozinha e o CI ficaria verde sem nunca ter
    # verificado a exclusão mútua entre processos.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, dom
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      # Rede de segurança: o teste de integração se pula sozinho quando não
      # alcança o Redis. Sem esta checagem, um serviço quebrado passaria
      # despercebido como suíte verde.
      - name: Fail if integration suite was skipped
        run: vendor/bin/phpunit -c phpunit.xml.dist --testsuite Integration --fail-on-skipped
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  # Entrega em production com CI verde vira versão sozinha. A versão nunca é
  # escrita à mão: nem no commit, nem no composer.json — sai da última tag.
  release:
    name: Release
    needs: phpunit
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest

    # Serializa pushes seguidos; dois jobs simultâneos calculariam a mesma tag.
    concurrency:
      group: release
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: bump
        name: Compute next tag
        run: |
          last=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$last" ]; then
            next="v1.0.0"
          else
            IFS=. read -r maj min pat <<< "${last#v}"
            next="v$maj.$min.$((pat + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      # ponytail: sempre patch. Para subir minor/major, criar a tag na mão uma
      # vez (git tag v1.1.0 && git push origin v1.1.0) — o cálculo segue dela.
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes
